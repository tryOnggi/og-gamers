<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #060814;
        --panel: rgba(8, 13, 28, 0.92);
        --panel-soft: rgba(255,255,255,0.06);
        --text: #f6f8ff;
        --muted: #97a7c7;
        --line: rgba(255,255,255,0.1);
        --accent: #53e4ff;
        --accent-2: #a855f7;
        --accent-3: #ff5ea8;
        --success: #22c55e;
        --warning: #f59e0b;
        --shadow: 0 20px 60px rgba(0,0,0,0.32);
      }
      body.light {
        --bg: #f4f7ff;
        --panel: rgba(255,255,255,0.95);
        --panel-soft: rgba(15, 23, 42, 0.04);
        --text: #0f172a;
        --muted: #64748b;
        --line: rgba(15, 23, 42, 0.08);
        --shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: 'Inter','Noto Sans KR',sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, rgba(83,228,255,0.16), transparent 25%), radial-gradient(circle at 90% 0%, rgba(168,85,247,0.18), transparent 28%), linear-gradient(135deg, #04070f 0%, #0b1124 50%, #060814 100%);
        min-height: 100vh;
      }
      body.light { background: linear-gradient(135deg, #f7faff 0%, #eef4ff 100%); }
      a { color: inherit; text-decoration: none; }
      button, input, select, textarea { font: inherit; }
      .shell { width: min(1320px, calc(100% - 30px)); margin: 0 auto; }
      .topbar { position: sticky; top: 0; z-index: 50; background: rgba(4, 8, 18, 0.76); backdrop-filter: blur(18px); border-bottom: 1px solid var(--line); }
      body.light .topbar { background: rgba(255,255,255,0.8); }
      .topbar-inner { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; gap: 16px; }
      .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; letter-spacing: 0.03em; }
      .brand-mark { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 14px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; box-shadow: 0 12px 30px rgba(83,228,255,0.25); }
      .nav { display: flex; flex-wrap: wrap; gap: 8px; }
      .nav a { padding: 8px 12px; border-radius: 999px; color: var(--muted); border: 1px solid transparent; transition: 0.2s ease; }
      .nav a:hover { color: var(--text); border-color: rgba(83,228,255,0.35); background: var(--panel-soft); }
      .hero { display: grid; grid-template-columns: 1.3fr 0.8fr; gap: 18px; padding: 28px 0 12px; }
      .card { background: var(--panel); border: 1px solid var(--line); border-radius: 24px; box-shadow: var(--shadow); backdrop-filter: blur(18px); }
      .hero-main { padding: 28px; position: relative; overflow: hidden; }
      .hero-main::after { content: ''; position: absolute; width: 260px; height: 260px; border-radius: 50%; right: -80px; bottom: -100px; background: radial-gradient(circle, rgba(83,228,255,0.18), transparent 72%); }
      .eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 7px 11px; border-radius: 999px; background: rgba(83,228,255,0.14); color: var(--accent); font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
      h1, h2, h3, h4, p { margin: 0; }
      h1 { font-size: clamp(28px, 4.6vw, 46px); line-height: 1.1; margin: 16px 0 12px; }
      .lead { color: var(--muted); line-height: 1.75; font-size: 15px; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 0 20px; }
      .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 15px; border-radius: 999px; border: 0; cursor: pointer; color: white; transition: 0.2s ease; }
      .btn:hover { transform: translateY(-2px); }
      .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
      .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid rgba(255,255,255,0.12); }
      body.light .btn-secondary { background: var(--panel-soft); }
      .stats { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; }
      .stat-box, .panel, .mini-card, .feed-card, .shop-card, .quest-card, .event-card, .ranking-card, .auth-card { padding: 16px; border-radius: 18px; background: var(--panel-soft); border: 1px solid var(--line); }
      .section { padding: 6px 0 16px; }
      .section-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
      .section-head span { color: var(--muted); font-size: 13px; }
      .grid { display: grid; gap: 16px; }
      .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .chip-list { display: flex; flex-wrap: wrap; gap: 8px; }
      .chip { padding: 7px 10px; border-radius: 999px; background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid rgba(255,255,255,0.08); font-size: 12px; }
      .chip.active { color: var(--text); background: rgba(83,228,255,0.16); border-color: rgba(83,228,255,0.35); }
      .thumb { height: 110px; border-radius: 14px; margin-bottom: 12px; background: linear-gradient(135deg, rgba(83,228,255,0.34), rgba(168,85,247,0.38)); }
      .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
      .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      .tag { padding: 6px 8px; border-radius: 999px; background: rgba(255,255,255,0.05); color: var(--muted); font-size: 11px; }
      .stack { display: grid; gap: 10px; }
      .input, select, textarea { width: 100%; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: var(--text); border-radius: 12px; padding: 11px 12px; }
      textarea { min-height: 92px; resize: vertical; }
      .line { display: flex; justify-content: space-between; align-items: center; gap: 10px; color: var(--muted); margin-top: 8px; }
      .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 10px 0; }
      .actions-inline { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      .inline-btn { padding: 8px 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.06); color: var(--text); cursor: pointer; }
      .avatar { width: 58px; height: 58px; border-radius: 18px; display: grid; place-items: center; font-size: 24px; background: linear-gradient(135deg, rgba(255,94,168,0.28), rgba(83,228,255,0.28)); }
      .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 999px; font-size: 12px; background: rgba(255,255,255,0.06); }
      .status { display: inline-flex; padding: 6px 8px; border-radius: 999px; font-size: 12px; }
      .status.live { background: rgba(34,197,94,0.16); color: #86efac; }
      .status.pending { background: rgba(245,158,11,0.16); color: #fcd34d; }
      .status.ready { background: rgba(83,228,255,0.16); color: var(--accent); }
      .friend-item, .poll-card, .achievement-card, .recommend-card, .chat-bubble { padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); }
      .chat-bubble.self { background: rgba(83,228,255,0.14); border-color: rgba(83,228,255,0.24); }
      .muted { color: var(--muted); }
      .footer { padding: 24px 0 40px; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
      .toast-root { position: fixed; right: 16px; bottom: 16px; display: grid; gap: 10px; z-index: 100; }
      .toast { padding: 12px 14px; border-radius: 14px; background: rgba(6,8,16,0.92); color: white; border: 1px solid rgba(255,255,255,0.14); box-shadow: var(--shadow); }
      .hidden { display: none !important; }
      @media (max-width: 1100px) { .hero, .grid-3, .grid-4 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }
      @media (max-width: 720px) { .topbar-inner { flex-wrap: wrap; } .stats { grid-template-columns: 1fr; } }
    </style>
  </head>

      function loadState() {

          return {
            ...JSON.parse(JSON.stringify(defaultState)),
            ...parsed,
            users: parsed.users || JSON.parse(JSON.stringify(defaultState.users)),

            games: parsed.games || JSON.parse(JSON.stringify(defaultState.games)),

        const password = form.password.value;
        const user = state.users.find((u) => u.email === email && u.password === password);
        if (!user) { showToast('로그인 정보가 올바르지 않습니다.'); return; }
        state.currentUserId = user.id;
        showToast(`${user.displayName}님 환영합니다.`);
        renderApp();
      }

        event.preventDefault();

        const password = form.password.value;
        if (!username || !email || !password) { showToast('모든 항목을 채워주세요.'); return; }
        if (state.users.some((u) => u.email === email)) { showToast('이미 가입된 이메일입니다.'); return; }
        const newUser = { id: `u${Date.now()}`, email, password, username, displayName: username, role: 'user', plan: 'free', points: 100, bio: '새로운 ONGI 유저입니다.', status: '신규 가입', avatar: '✨', badges: ['가입 배지'], favorites: [], achievements: ['첫 가입'], inventory: [] };
        state.users.push(newUser);
        state.currentUserId = newUser.id;
        showToast('회원가입이 완료되었습니다.');
        renderApp();
      }
      function handleProfile(event) {
        event.preventDefault();
        const user = getCurrentUser();
        if (!user) return;
        user.status = event.target.status.value.trim() || user.status;
        user.bio = event.target.bio.value.trim() || user.bio;
        showToast('프로필이 저장되었습니다.');
        renderApp();
      }
      function handlePost(event) {
        event.preventDefault();
        const user = getCurrentUser();
        if (!user) { showToast('로그인 후 게시글을 작성할 수 있습니다.'); return; }
        const tags = event.target.tags.value.split(',').map((t) => t.trim()).filter(Boolean);
        const post = { id: `p${Date.now()}`, authorId: user.id, title: event.target.title.value.trim(), body: event.target.body.value.trim(), category: 'guide', tags, likes: 0, dislikes: 0, views: 0, bookmarked: false, pinned: false, comments: [], createdAt: new Date().toISOString() };
        state.posts.unshift(post);
        event.target.reset();
        showToast('게시글이 등록되었습니다.');
        renderApp();
      }
      function handleClick(event) {
        const navTarget = event.target.closest('[data-nav]');
        if (navTarget) { event.preventDefault(); navigateTo(navTarget.dataset.nav); return; }
        const target = event.target.closest('button, [data-logout], [data-theme-toggle], [data-join-game], [data-claim-quest], [data-join-event], [data-buy-item], [data-reaction], [data-bookmark], [data-vote-poll], [data-claim-achievement], [data-follow-friend], [data-join-clan], [data-refresh-ai], [data-feed-filter]');
        if (!target) return;
        if (target.matches('[data-feed-filter]')) { state.ui.feedFilter = target.dataset.feedFilter; renderApp(); return; }
        if (target.matches('[data-logout]')) { state.currentUserId = null; showToast('로그아웃되었습니다.'); renderApp(); return; }
        if (target.matches('[data-theme-toggle]')) { state.ui.theme = state.ui.theme === 'dark' ? 'light' : 'dark'; showToast('테마가 변경되었습니다.'); renderApp(); return; }
        if (target.matches('[data-join-game]')) { showToast('매치 참가 요청이 접수되었습니다.'); return; }
        if (target.matches('[data-claim-quest]')) { const quest = state.quests.find((item) => item.id === target.dataset.claimQuest); if (!quest) return; if (quest.status === 'done') { showToast('이미 수령한 퀘스트입니다.'); return; } const user = getCurrentUser(); if (!user) { showToast('로그인 후 수령할 수 있습니다.'); return; } quest.status = 'done'; user.points += 200; showToast(`${quest.title} 보상을 수령했습니다.`); renderApp(); return; }
        if (target.matches('[data-join-event]')) { const user = getCurrentUser(); if (!user) { showToast('로그인 후 참여할 수 있습니다.'); return; } user.points += 50; showToast('이벤트 참여가 완료되었습니다.'); renderApp(); return; }
        if (target.matches('[data-buy-item]')) { const user = getCurrentUser(); if (!user) { showToast('로그인 후 구매할 수 있습니다.'); return; } const item = state.storeItems.find((entry) => entry.id === target.dataset.buyItem); if (!item) return; if (user.points < item.price) { showToast('포인트가 부족합니다.'); return; } user.points -= item.price; user.inventory.push(item.name); showToast(`${item.name}을 구매했습니다.`); renderApp(); return; }
        if (target.matches('[data-reaction]')) { const post = state.posts.find((item) => item.id === target.dataset.postId); if (!post) return; if (target.dataset.reaction === 'like') post.likes += 1; else post.dislikes += 1; renderApp(); return; }
        if (target.matches('[data-bookmark]')) { const post = state.posts.find((item) => item.id === target.dataset.bookmark); if (!post) return; post.bookmarked = !post.bookmarked; showToast(post.bookmarked ? '저장되었습니다.' : '저장 해제되었습니다.'); renderApp(); return; }
        if (target.matches('[data-vote-poll]')) { const [pollId, optionId] = target.dataset.votePoll.split(':'); const poll = state.polls.find((item) => item.id === pollId); if (!poll) return; const option = poll.options.find((item) => item.id === optionId); if (option) { option.votes += 1; showToast('투표가 반영되었습니다.'); renderApp(); } return; }
        if (target.matches('[data-claim-achievement]')) { const achievement = state.achievements.find((item) => item.id === target.dataset.claimAchievement); if (!achievement) return; if (!achievement.unlocked) { showToast('아직 조건을 만족하지 않았습니다.'); return; } const user = getCurrentUser(); if (!user) { showToast('로그인 후 수령할 수 있습니다.'); return; } user.points += 50; achievement.unlocked = false; showToast(`${achievement.title} 보상을 받았습니다.`); renderApp(); return; }
        if (target.matches('[data-follow-friend]')) { const user = getCurrentUser(); if (!user) { showToast('로그인 후 친구 요청을 보낼 수 있습니다.'); return; } showToast('친구 요청이 전송되었습니다.'); return; }
        if (target.matches('[data-join-clan]')) { const user = getCurrentUser(); if (!user) { showToast('로그인 후 클랜에 가입할 수 있습니다.'); return; } showToast('클랜 가입 요청이 접수되었습니다.'); return; }
        if (target.matches('[data-refresh-ai]')) { state.aiRecommendations.unshift({ id: `r${Date.now()}`, title: '새 추천', body: '오늘의 맞춤 추천이 갱신되었습니다.' }); showToast('추천이 갱신되었습니다.'); renderApp(); return; }
      }
      function handleSubmit(event) {
        if (event.target.id === 'login-form') { handleLogin(event); return; }
        if (event.target.id === 'register-form') { handleRegister(event); return; }
        if (event.target.id === 'profile-form') { handleProfile(event); return; }
        if (event.target.id === 'post-form') { handlePost(event); return; }
        if (event.target.matches('[data-comment-form]')) { event.preventDefault(); const user = getCurrentUser(); if (!user) { showToast('로그인 후 댓글을 남길 수 있습니다.'); return; } const post = state.posts.find((item) => item.id === event.target.dataset.commentForm); if (!post) return; post.comments.push({ id: `c${Date.now()}`, authorId: user.id, body: event.target.comment.value.trim() }); event.target.reset(); showToast('댓글이 등록되었습니다.'); renderApp(); }
        if (event.target.id === 'chat-form') { event.preventDefault(); const user = getCurrentUser(); if (!user) { showToast('로그인 후 채팅할 수 있습니다.'); return; } state.chatMessages.push({ id: `m${Date.now()}`, author: user.displayName, body: event.target.message.value.trim() }); event.target.reset(); renderApp(); }
      }
      function handleInput(event) {
        if (event.target.id === 'search-posts') {
          state.ui.searchQuery = event.target.value;
          renderApp();
        }
      }
      document.addEventListener('click', handleClick);
      document.addEventListener('submit', handleSubmit);
      document.addEventListener('input', handleInput);
      window.addEventListener('hashchange', () => {
        const hash = location.hash.replace('#', '') || 'home';
        if (pageNames.some((page) => page.key === hash)) {
          state.ui.currentPage = hash;
          renderApp();
        }
      });
      window.addEventListener('DOMContentLoaded', () => {
        const hash = location.hash.replace('#', '') || 'home';
        if (pageNames.some((page) => page.key === hash)) state.ui.currentPage = hash;
        applyTheme();
        renderApp();
      });
    </script>
  </body>
</html>

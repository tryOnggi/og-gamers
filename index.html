<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ONGI — 실제 서비스형 게임 커뮤니티</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #04070f;
        --panel: rgba(10, 16, 32, 0.9);
        --panel-2: rgba(255,255,255,0.05);
        --text: #f3f7ff;
        --muted: #8fa4c7;
        --line: rgba(255,255,255,0.1);
        --accent: #5ee7ff;
        --accent-2: #8b5cf6;
        --accent-3: #ff4d8d;
        --success: #34d399;
        --warning: #fbbf24;
        --shadow: 0 20px 60px rgba(0,0,0,0.32);
      }
      body.light {
        --bg: #f6f7fb;
        --panel: rgba(255,255,255,0.9);
        --panel-2: rgba(10,16,32,0.04);
        --text: #0f172a;
        --muted: #64748b;
        --line: rgba(15,23,42,0.08);
        --shadow: 0 20px 60px rgba(15,23,42,0.1);
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: 'Inter', 'Noto Sans KR', sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, rgba(94,231,255,0.18), transparent 24%), radial-gradient(circle at 90% 0%, rgba(139,92,246,0.18), transparent 22%), linear-gradient(135deg, #04070f 0%, #0b1022 50%, #03060f 100%);
        min-height: 100vh;
      }
      body.light { background: linear-gradient(135deg, #f8fbff 0%, #eef3ff 100%); }
      a { color: inherit; text-decoration: none; }
      button, input, select, textarea { font: inherit; }
      .shell { width: min(1400px, calc(100% - 32px)); margin: 0 auto; }
      .topbar { position: sticky; top: 0; z-index: 40; backdrop-filter: blur(18px); background: rgba(4, 8, 20, 0.78); border-bottom: 1px solid var(--line); }
      body.light .topbar { background: rgba(255,255,255,0.8); }
      .topbar-inner { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 14px 0; }
      .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; letter-spacing: .04em; }
      .brand-mark { width: 42px; height: 42px; border-radius: 14px; display: grid; place-items: center; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; box-shadow: 0 15px 40px rgba(94,231,255,0.25); }
      .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
      .nav-links a { padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--muted); transition: .2s ease; }
      body.light .nav-links a { background: var(--panel-2); }
      .nav-links a.active, .nav-links a:hover { color: var(--text); border-color: rgba(94,231,255,0.4); transform: translateY(-2px); }
      .hero { display: grid; grid-template-columns: 1.35fr .65fr; gap: 20px; padding: 28px 0 16px; }
      .card { background: var(--panel); border: 1px solid var(--line); border-radius: 24px; box-shadow: var(--shadow); backdrop-filter: blur(18px); }
      .hero-main { padding: 28px; position: relative; overflow: hidden; }
      .hero-main::after { content: ''; position: absolute; width: 220px; height: 220px; border-radius: 50%; right: -40px; bottom: -60px; background: radial-gradient(circle, rgba(94,231,255,0.3), transparent 70%); }
      .eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 999px; background: rgba(94,231,255,0.13); color: var(--accent); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
      h1, h2, h3, h4, p { margin: 0; }
      h1 { font-size: clamp(28px, 4.5vw, 48px); margin: 14px 0 12px; line-height: 1.1; }
      .hero p, .muted { color: var(--muted); line-height: 1.7; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 0 20px; }
      .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 0; border-radius: 999px; padding: 11px 15px; cursor: pointer; color: white; transition: .25s ease; }
      .btn:hover { transform: translateY(-2px); }
      .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
      .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid rgba(255,255,255,0.12); }
      body.light .btn-secondary { background: var(--panel-2); }
      .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
      .stat-box, .panel, .feature-card, .game-card, .post-card, .payment-card, .admin-card, .side-item, .auth-card, .empty-card {
        padding: 16px; border-radius: 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
      body.light .stat-box, body.light .panel, body.light .feature-card, body.light .game-card, body.light .post-card, body.light .payment-card, body.light .admin-card, body.light .side-item, body.light .auth-card, body.light .empty-card { background: var(--panel-2); }
      .stat-box strong { display: block; font-size: 18px; margin-top: 6px; }
      .stat-box span { color: var(--muted); font-size: 12px; }
      .side-item { display: grid; gap: 8px; }
      .section { padding: 16px 0 8px; }
      .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
      .section-head span { color: var(--muted); font-size: 13px; }
      .grid { display: grid; gap: 16px; }
      .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .chip-list { display: flex; flex-wrap: wrap; gap: 8px; }
      .chip { padding: 8px 10px; border-radius: 999px; background: rgba(255,255,255,0.05); color: var(--muted); font-size: 13px; border: 1px solid rgba(255,255,255,0.08); }
      .chip.active { color: var(--text); background: rgba(94,231,255,0.18); border-color: rgba(94,231,255,0.35); }
      .game-card .thumb { height: 110px; border-radius: 14px; margin-bottom: 12px; background: linear-gradient(135deg, rgba(94,231,255,0.35), rgba(139,92,246,0.4)); }
      .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
      .tag-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
      .tag { padding: 6px 8px; border-radius: 999px; font-size: 11px; background: rgba(255,255,255,0.05); color: var(--muted); }
      .stack { display: grid; gap: 10px; }
      .input, select, textarea { width: 100%; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: var(--text); border-radius: 12px; padding: 11px 12px; }
      textarea { min-height: 92px; resize: vertical; }
      .two-col { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px; }
      .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      .badge { padding: 7px 10px; border-radius: 999px; background: rgba(255,255,255,0.06); color: var(--text); font-size: 12px; }
      .status { display: inline-flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 999px; font-size: 12px; }
      .status.approved { background: rgba(52,211,153,0.16); color: #8df2c2; }
      .status.pending { background: rgba(251,191,36,0.16); color: #fdd88d; }
      .status.rejected { background: rgba(255,77,141,0.16); color: #ff9ec2; }
      .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 10px 0; }
      .actions-inline { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      .inline-btn { padding: 8px 10px; border-radius: 999px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); cursor: pointer; color: var(--text); }
      .line { display: flex; justify-content: space-between; gap: 8px; margin-top: 6px; color: var(--muted); }
      .footer { padding: 24px 0 36px; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
      .hidden { display: none !important; }
      .avatar { width: 72px; height: 72px; border-radius: 20px; background: linear-gradient(135deg, rgba(255,77,141,0.38), rgba(94,231,255,0.35)); display: grid; place-items: center; font-size: 32px; }
      .profile-card { display: flex; gap: 16px; align-items: center; }
      .table { width: 100%; border-collapse: collapse; }
      .table th, .table td { text-align: left; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 13px; }
      .table th { color: var(--muted); }
      .subtle { color: var(--muted); font-size: 13px; }
      .section-title { display: inline-flex; align-items: center; gap: 8px; color: var(--text); font-weight: 700; margin-bottom: 10px; }
      @media (max-width: 1100px) { .hero, .two-col, .grid-3, .grid-4 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }
      @media (max-width: 720px) { .topbar-inner { flex-wrap: wrap; } .stats { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="shell topbar-inner">
        <a class="brand" href="#home" data-nav="home">
          <div class="brand-mark">◉</div>
          <div>ONGI<br /><span class="muted" style="font-size: 12px; font-weight: 600;">Game Community · Monetization</span></div>
        </a>
        <nav class="nav-links" id="nav-links"></nav>
      </div>
    </header>

    <main class="shell" id="app"></main>

    <footer class="shell footer">
      <div>ONGI — 게임 전문 커뮤니티 + 콘텐츠 플랫폼 + 광고 플랫폼</div>
      <div>소개 · 이용약관 · 개인정보처리방침 · 문의</div>
    </footer>

    <script>
      const STORAGE_KEY = 'ongi-app-state-v1';
      const pageNames = [
        { key: 'home', label: '홈' },
        { key: 'games', label: '게임' },
        { key: 'community', label: '커뮤니티' },
        { key: 'profile', label: '프로필' },
        { key: 'monetization', label: '수익화' },
        { key: 'admin', label: '관리자' },
        { key: 'settings', label: '설정' }
      ];

      const defaultState = {
        users: [
          { id: 'u1', email: 'admin@ongi.com', password: '1234', username: 'NovaPlayer', displayName: 'NovaPlayer', role: 'admin', plan: 'pro', points: 1240, bio: '공략왕 / 패치 헌터', status: '오늘도 파밍 중', avatar: '🎮', badges: ['공략왕', '개발자', '관리자'], favorites: ['Valorant', 'Genshin Impact'], achievements: ['초보 탈출', '패치 헌터'] },
          { id: 'u2', email: 'user@ongi.com', password: '1234', username: 'Aiko', displayName: 'Aiko', role: 'user', plan: 'plus', points: 480, bio: '모드 수집가', status: '새로운 빌드 테스트 중', avatar: '🕹️', badges: ['질문왕'], favorites: ['Fortnite'], achievements: ['첫 게시글'] }
        ],
        posts: [
          { id: 'p1', authorId: 'u1', title: 'Valorant 에이전트 빌드 추천', body: '초보자도 바로 적용 가능한 세팅과 루틴을 정리해봤어요.', category: 'guide', tags: ['Guide', 'Build', 'PvP'], likes: 24, dislikes: 2, views: 3200, createdAt: '2026-07-08T02:00:00.000Z', bookmarked: false, comments: [{ id: 'c1', authorId: 'u2', body: '좋은 정보 감사합니다!', createdAt: '2026-07-08T02:10:00.000Z' }] },
          { id: 'p2', authorId: 'u2', title: '신규 패치 노트 요약', body: '핵심 변경점만 보면 바로 이해되는 패치 요약입니다.', category: 'patch', tags: ['Patch', 'Meta', 'News'], likes: 9, dislikes: 1, views: 1900, createdAt: '2026-07-08T01:30:00.000Z', bookmarked: false, comments: [] }
        ],
        games: [
          { id: 'g1', title: 'Valorant', genre: 'FPS', platform: 'PC', price: '무료', rating: 4.8, description: '전략형 FPS 공략과 에이전트 빌드 공유', tabs: { guide: '에이전트별 기본 딜레이와 세팅', bug: '버그 리포트 및 패치 반영 상황', patch: '최근 패치 핵심 변경점' } },
          { id: 'g2', title: 'Genshin Impact', genre: 'RPG', platform: 'PC / Mobile', price: '무료', rating: 4.7, description: '파티 빌드와 캐릭터 공략 모음', tabs: { guide: '딜량 빌드, 서브스탯 정리', bug: '퀘스트 및 인터페이스 이슈', patch: '이벤트와 업데이트 요약' } },
          { id: 'g3', title: 'Fortnite', genre: 'Battle Royale', platform: 'PC / Console', price: '무료', rating: 4.6, description: '시즌 이벤트와 모드 정보 모음', tabs: { guide: '빌드 공유와 맵 핫스팟', bug: '서버 이슈 및 플레이 이슈', patch: '시즌 패치 포인트' } }
        ],
        ads: [
          { id: 'ad1', title: 'Steam Summer Sale', company: 'Steam', link: '#', description: '여름 할인 캠페인', type: 'image', status: 'approved', views: 824, clicks: 41, ctr: 4.98, cost: 1200, location: 'Top Banner' },
          { id: 'ad2', title: 'AMD Radeon', company: 'AMD', link: '#', description: '게임용 GPU 추천', type: 'video', status: 'pending', views: 420, clicks: 18, ctr: 4.29, cost: 800, location: 'Sidebar' }
        ],
        selectedGameId: 'g1',
        currentUserId: null,
        ui: { currentPage: 'home', theme: 'dark', compact: false, notifications: true, language: 'ko' }
      };

      const state = loadState();

      function loadState() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (!parsed) return structuredClone(defaultState);
          return {
            ...structuredClone(defaultState),
            ...parsed,
            users: parsed.users || structuredClone(defaultState.users),
            posts: parsed.posts || structuredClone(defaultState.posts),
            games: parsed.games || structuredClone(defaultState.games),
            ads: parsed.ads || structuredClone(defaultState.ads),
            ui: { ...structuredClone(defaultState.ui), ...(parsed.ui || {}) },
            selectedGameId: parsed.selectedGameId || structuredClone(defaultState.selectedGameId),
            currentUserId: parsed.currentUserId || null
          };
        } catch (error) {
          return structuredClone(defaultState);
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function getCurrentUser() {
        return state.users.find((user) => user.id === state.currentUserId) || null;
      }

      function applyTheme() {
        document.body.classList.toggle('light', state.ui.theme === 'light');
      }

      function renderNav() {
        const nav = document.getElementById('nav-links');
        nav.innerHTML = pageNames.map((page) => `<a href="#${page.key}" data-nav="${page.key}" class="${state.ui.currentPage === page.key ? 'active' : ''}">${page.label}</a>`).join('');
      }

      function renderApp() {
        applyTheme();
        renderNav();
        const app = document.getElementById('app');
        const page = state.ui.currentPage;
        if (page === 'home') renderHome(app);
        else if (page === 'games') renderGames(app);
        else if (page === 'community') renderCommunity(app);
        else if (page === 'profile') renderProfile(app);
        else if (page === 'monetization') renderMonetization(app);
        else if (page === 'admin') renderAdmin(app);
        else if (page === 'settings') renderSettings(app);
        saveState();
      }

      function renderHome(app) {
        const user = getCurrentUser();
        const totalPosts = state.posts.length;
        const totalUsers = state.users.length;
        const approvedAds = state.ads.filter((ad) => ad.status === 'approved').length;
        const totalViews = state.posts.reduce((sum, post) => sum + post.views, 0);
        app.innerHTML = `
          <section class="hero">
            <div class="card hero-main">
              <div class="eyebrow">● LIVE • ONGI • 실제 서비스형</div>
              <h1>게임 공략, 뉴스, 커뮤니티, 광고, 멤버십까지 한 곳에서 운영합니다.</h1>
              <p>로그인/회원가입, 게시글 작성, 댓글, 북마크, 좋아요, 프로필 커스터마이징, 멤버십 구매, 광고 등록까지 로컬스토리지 기반으로 바로 동작하는 실제형 UI입니다.</p>
              <div class="actions">
                <a class="btn btn-primary" href="#community" data-nav="community">커뮤니티 둘러보기</a>
                <a class="btn btn-secondary" href="#monetization" data-nav="monetization">ONGI+ 플랜 보기</a>
              </div>
              <div class="stats">
                <div class="stat-box"><span>오늘 방문자</span><strong>92,340</strong></div>
                <div class="stat-box"><span>총 게시글</span><strong>${totalPosts}</strong></div>
                <div class="stat-box"><span>실시간 접속자</span><strong>${totalViews}</strong></div>
              </div>
            </div>
            <div class="card" style="padding: 22px; display: grid; gap: 12px;">
              <div class="section-title">인증</div>
              ${user ? `<div class="profile-card"><div class="avatar">${escapeHtml(user.avatar)}</div><div><h3>${escapeHtml(user.displayName)}</h3><p class="muted">${escapeHtml(user.plan.toUpperCase())} · ${escapeHtml(user.points)} 포인트</p><div class="badge-row">${user.badges.slice(0,3).map((b)=>(`<span class="badge">${escapeHtml(b)}</span>`)).join('')}</div></div></div>` : `<div class="empty-card"><p class="muted">로그인하면 프로필, 포인트, 북마크, 멤버십 상태를 바로 관리할 수 있습니다.</p><div class="actions"><a class="btn btn-primary" href="#profile" data-nav="profile">로그인 / 회원가입</a></div></div>`}
              <div class="side-item"><strong>오늘의 인기 태그</strong><div class="chip-list"><span class="chip active">#PvP</span><span class="chip">#Build</span><span class="chip">#Guide</span><span class="chip">#Patch</span></div></div>
              <div class="side-item"><strong>게임 할인 정보</strong><div class="line"><span>Steam Summer Sale</span><strong>−70%</strong></div><div class="line"><span>Cyberpunk 2077</span><strong>−50%</strong></div></div>
            </div>
          </section>

          <section class="section">
            <div class="section-head"><h2>메인 위젯</h2><span>HOT • Trending • New • Popular</span></div>
            <div class="grid grid-4">
              ${['HOT','Trending','New','Weekly'].map((item)=>`<div class="feature-card"><h3>${item}</h3><p class="muted">${item === 'HOT' ? '실시간 급상승 공략과 토론' : item === 'Trending' ? '크리에이터가 주목받는 콘텐츠' : item === 'New' ? '새로 올라온 게시글과 모드' : '이번 주 인기 게임과 공략'}</p></div>`).join('')}
            </div>
          </section>

          <section class="section">
            <div class="section-head"><h2>커뮤니티 요약</h2><span>게시글 • 댓글 • 포인트 • 광고</span></div>
            <div class="grid grid-3">
              <div class="panel"><h3>최근 게시글</h3><div class="divider"></div>${state.posts.slice(0,2).map((post)=>`<div class="line"><span>${escapeHtml(post.title)}</span><strong>${escapeHtml(post.category)}</strong></div>`).join('')}</div>
              <div class="panel"><h3>유저 현황</h3><div class="divider"></div><div class="line"><span>총 유저</span><strong>${totalUsers}</strong></div><div class="line"><span>승인 광고</span><strong>${approvedAds}</strong></div><div class="line"><span>포인트 총합</span><strong>${state.users.reduce((sum,u)=>sum+u.points,0)}</strong></div></div>
              <div class="panel"><h3>추가 기능</h3><div class="divider"></div><div class="chip-list"><span class="chip">업적</span><span class="chip">인벤토리</span><span class="chip">길드</span><span class="chip">AI 추천</span><span class="chip">출시 캘린더</span></div></div>
            </div>
          </section>
        `;
      }

      function renderGames(app) {
        const selectedGame = state.games.find((game) => game.id === state.selectedGameId) || state.games[0];
        app.innerHTML = `
          <section class="section">
            <div class="section-head"><h2>게임</h2><span>Grid • List • Search • Filter • Sort</span></div>
            <div class="card" style="padding: 18px;">
              <div class="chip-list" style="margin-bottom: 12px;">
                ${state.games.map((game)=>`<button class="chip ${selectedGame.id===game.id?'active':''}" data-select-game="${game.id}">${escapeHtml(game.title)}</button>`).join('')}
              </div>

      function renderSettings(app) {
        app.innerHTML = `
          <section class="section">
            <div class="section-head"><h2>설정</h2><span>테마 · 알림 · 언어 · 반응형</span></div>
            <div class="two-col">
              <div class="card" style="padding: 18px;">
                <h3>UI 환경설정</h3>
                <div class="stack" style="margin-top: 12px;">
                  <label class="line"><span>다크모드</span><input type="radio" name="theme" value="dark" ${state.ui.theme === 'dark' ? 'checked' : ''} data-theme-set="dark" /></label>
                  <label class="line"><span>라이트모드</span><input type="radio" name="theme" value="light" ${state.ui.theme === 'light' ? 'checked' : ''} data-theme-set="light" /></label>
                  <label class="line"><span>컴팩트 모드</span><input type="checkbox" ${state.ui.compact ? 'checked' : ''} data-compact-set /></label>
                  <label class="line"><span>알림 켜기</span><input type="checkbox" ${state.ui.notifications ? 'checked' : ''} data-notify-set /></label>
                </div>
              </div>
              <div class="card" style="padding: 18px;">
                <h3>계정 설정</h3>
                <div class="chip-list" style="margin-top: 10px;">
                  <span class="chip">프로필</span><span class="chip">비밀번호</span><span class="chip">이메일</span><span class="chip">알림</span><span class="chip">언어</span><span class="chip">차단 유저</span>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function getUserName(userId) {
        const user = state.users.find((u) => u.id === userId);
        return user ? user.displayName : '익명';
      }

      function navigateTo(page) {
        state.ui.currentPage = page;
        window.location.hash = page;
        renderApp();
      }

      function handleAuth(event) {
        const form = event.target;
        if (form.id === 'login-form') {
          event.preventDefault();
          const email = form.email.value.trim();
          const password = form.password.value;
          const user = state.users.find((u) => u.email === email && u.password === password);
          if (user) {
            state.currentUserId = user.id;
            alert('로그인되었습니다.');
            navigateTo('profile');
          } else {
            alert('이메일 또는 비밀번호가 올바르지 않습니다.');
          }
        }
        if (form.id === 'register-form') {
          event.preventDefault();
          const username = form.username.value.trim();
          const email = form.email.value.trim();
          const password = form.password.value;
          if (!username || !email || !password) {
            alert('모든 항목을 입력해주세요.');
            return;
          }
          const exists = state.users.some((u) => u.email === email);
          if (exists) {
            alert('이미 가입된 이메일입니다.');
            return;
          }
          const newUser = { id: `u${Date.now()}`, email, password, username, displayName: username, role: 'user', plan: 'free', points: 100, bio: '새로운 ONGI 유저입니다.', status: '안녕하세요!', avatar: '🧑', badges: ['가입 배지'], favorites: [], achievements: ['첫 가입'] };
          state.users.push(newUser);
          state.currentUserId = newUser.id;
          alert('회원가입이 완료되었습니다.');
          navigateTo('profile');
        }
        if (form.id === 'profile-form') {
          event.preventDefault();
          const user = getCurrentUser();
          if (!user) return;
          user.displayName = form.displayName.value.trim() || user.displayName;
          user.status = form.status.value.trim() || user.status;
          user.bio = form.bio.value.trim() || user.bio;
          alert('프로필이 저장되었습니다.');
          renderApp();
        }
        if (form.id === 'post-form') {
          event.preventDefault();
          if (!getCurrentUser()) {
            alert('로그인 후 작성해 주세요.');
            return;
          }
          const post = {
            id: `p${Date.now()}`,
            authorId: state.currentUserId,
            title: form.title.value.trim(),
            body: form.body.value.trim(),
            category: form.category.value,
            tags: form.tags.value.split(',').map((t) => t.trim()).filter(Boolean),
            likes: 0,
            dislikes: 0,
            views: 0,
            bookmarked: false,
            createdAt: new Date().toISOString(),
            comments: []
          };
          state.posts.push(post);
          form.reset();
          alert('게시글이 등록되었습니다.');
          navigateTo('community');
        }
      }

      function handleAppClick(event) {
        const navTarget = event.target.closest('[data-nav]');
        if (navTarget) {
          event.preventDefault();
          navigateTo(navTarget.dataset.nav);
          return;
        }
        const gameTarget = event.target.closest('[data-select-game]');
        if (gameTarget) {
          state.selectedGameId = gameTarget.dataset.selectGame;
          renderApp();
          return;
        }
        const planTarget = event.target.closest('[data-purchase-plan]');
        if (planTarget) {
          const user = getCurrentUser();
          if (!user) {
            alert('로그인 후 이용해 주세요.');
            return;
          }
          user.plan = planTarget.dataset.purchasePlan;
          user.points += 50;
          alert(`${planTarget.dataset.purchasePlan.toUpperCase()} 플랜을 구독했습니다.`);
          renderApp();
          return;
        }
        const deletePostTarget = event.target.closest('[data-delete-post]');
        if (deletePostTarget) {
          state.posts = state.posts.filter((post) => post.id !== deletePostTarget.dataset.deletePost);
          renderApp();
          return;
        }
        const approveAdTarget = event.target.closest('[data-approve-ad]');
        if (approveAdTarget) {
          const ad = state.ads.find((item) => item.id === approveAdTarget.dataset.approveAd);
          if (ad) ad.status = 'approved';
          renderApp();
          return;
        }
        const reactionTarget = event.target.closest('[data-reaction]');
        if (reactionTarget) {
          const post = state.posts.find((item) => item.id === reactionTarget.dataset.postId);
          if (!post) return;
          if (reactionTarget.dataset.reaction === 'like') post.likes += 1;
          else post.dislikes += 1;
          renderApp();
          return;
        }
        const bookmarkTarget = event.target.closest('[data-bookmark]');
        if (bookmarkTarget) {
          const post = state.posts.find((item) => item.id === bookmarkTarget.dataset.bookmark);
          if (!post) return;
          post.bookmarked = !post.bookmarked;
          renderApp();
          return;
        }
        if (event.target.id === 'logout-btn') {
          state.currentUserId = null;
          alert('로그아웃되었습니다.');
          navigateTo('home');
        }
      }

      function handleSettingsChange(event) {
        const target = event.target;
        if (target.matches('[data-theme-set]')) {
          state.ui.theme = target.value;
          renderApp();
        }
        if (target.matches('[data-compact-set]')) {
          state.ui.compact = target.checked;
          renderApp();
        }
        if (target.matches('[data-notify-set]')) {
          state.ui.notifications = target.checked;
          renderApp();
        }
      }

      function handleSubmit(event) {
        if (event.target.id === 'ad-form') {
          event.preventDefault();
          const ad = {
            id: `ad${Date.now()}`,
            title: event.target.title.value.trim(),
            company: event.target.company.value.trim(),
            location: event.target.location.value.trim(),
            description: event.target.description.value.trim(),
            type: 'image',
            status: 'pending',
            views: 0,
            clicks: 0,
            ctr: 0,
            cost: 0
          };
          state.ads.push(ad);
          event.target.reset();
          alert('광고가 등록 요청되었습니다.');
          renderApp();
          return;
        }
        if (event.target.matches('[data-comment-form]')) {
          event.preventDefault();
          const postId = event.target.dataset.commentForm;
          const post = state.posts.find((item) => item.id === postId);
          if (!post) return;
          if (!getCurrentUser()) {
            alert('로그인 후 댓글을 작성할 수 있습니다.');
            return;
          }
          post.comments.push({ id: `c${Date.now()}`, authorId: state.currentUserId, body: event.target.comment.value.trim(), createdAt: new Date().toISOString() });
          event.target.reset();
          renderApp();
        }
      }

      document.addEventListener('click', handleAppClick);
      document.addEventListener('submit', (event) => {
        handleAuth(event);
        handleSubmit(event);
      });
      document.addEventListener('change', handleSettingsChange);

      window.addEventListener('hashchange', () => {
        const hash = location.hash.replace('#', '') || 'home';
        if (pageNames.some((page) => page.key === hash)) {
          state.ui.currentPage = hash;
          renderApp();
        }
      });

      document.addEventListener('DOMContentLoaded', () => {
        const hash = location.hash.replace('#', '') || 'home';
        if (pageNames.some((page) => page.key === hash)) state.ui.currentPage = hash;
        applyTheme();
        renderApp();
      });
    </script>
  </body>
</html>
